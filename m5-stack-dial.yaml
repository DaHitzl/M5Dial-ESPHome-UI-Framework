esphome:
  name: m5stack-dial
  friendly_name: M5Stack Dial
  includes:
    - m5dial/sound_manager.h
    - m5dial/ui_helpers.h
    - m5dial/page_interface.h
    - m5dial/page_main.h
    - m5dial/page_ha.h
    - m5dial/page_settings.h
    - m5dial/page_music.h
    - m5dial/m5dial_ui.h

  on_boot:
    priority: 900
    then:
      - lambda: |-
          gpio_config_t io_conf;
          io_conf.intr_type = GPIO_INTR_DISABLE;
          io_conf.mode = GPIO_MODE_OUTPUT;
          io_conf.pin_bit_mask = (1ULL << 46);
          io_conf.pull_down_en = GPIO_PULLDOWN_DISABLE;
          io_conf.pull_up_en = GPIO_PULLUP_DISABLE;
          gpio_config(&io_conf);
          gpio_set_level(GPIO_NUM_46, 1);
      - delay: 1s
      - sensor.rotary_encoder.set_value:
          id: dial_encoder
          value: 0
      - component.update: meine_display_id

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf

image:
  - file: "m5dial/Small_UI_main1.png"
    id: img_main
    resize: 240x240
    type: RGB565
  - file: "m5dial/Small_UI_settings.png"
    id: img_settings
    resize: 240x240
    type: RGB565
  - file: "m5dial/Small_UI_Music.png"
    id: img_music
    resize: 240x240
    type: RGB565
  - file: "m5dial/Small_UI_HA_noF.png"
    id: img_ha_nof
    resize: 240x240
    type: RGB565

logger:
  level: DEBUG

api:
  id: api_server
  encryption:
    key: "Your Api Key"

ota:
  - platform: esphome
    password: "Your esphome Password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "M5-Stack-Dial Fallback Hotspot"
    password: "*"

time:
  - platform: homeassistant
    id: ha_time

i2c:
  - id: bus_internal
    sda: GPIO11
    scl: GPIO12
    frequency: 400kHz

spi:
  id: spi_bus
  clk_pin: GPIO6
  mosi_pin: GPIO5

font:
  - file: "gfonts://Roboto"
    id: meine_schrift
    size: 20
    glyphs:
      - "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,:;-_!?+=*<>/()[]{}%°äöüÄÖÜß"

output:
  - platform: ledc
    pin: GPIO9
    id: backlight_pwm
    frequency: 1000Hz
  - platform: ledc
    pin: GPIO3
    id: buzzer_pwm

rtttl:
  output: buzzer_pwm
  id: my_buzzer

script:
  - id: play_click_right
    mode: restart
    then: [rtttl.play: "click_r:d=4,o=6,b=900:e"]
  - id: play_click_left
    mode: restart
    then: [rtttl.play: "click_l:d=4,o=6,b=900:c"]
  - id: play_touch
    mode: restart
    then: [rtttl.play: "touch:d=16,o=7,b=240:e"]
  - id: play_button_deep
    mode: restart
    then: [rtttl.play: "button:d=16,o=6,b=900:e"]
  - id: play_back
    mode: restart
    then: [rtttl.play: "back:d=16,o=5,b=240:a,g"]

  - id: filter_on_script
    mode: single
    then:
      - homeassistant.service:
          service: input_boolean.turn_on
          data: { entity_id: input_boolean.m5_dial_filter_mode }
  - id: filter_off_script
    mode: single
    then:
      - homeassistant.service:
          service: input_boolean.turn_off
          data: { entity_id: input_boolean.m5_dial_filter_mode }

  # Dieses Hilfs-Script verzögert den UI-Reset minimal,
  # damit HA Zeit hat, die Daten zu aktualisieren.
  - id: script_ha_select_room
    mode: single
    then:
      - homeassistant.service:
          service: input_text.set_value
          data:
            entity_id: input_text.m5_selected_room
            value: !lambda 'return dial_ui->get_ha_page()->get_selected_room();'
      - delay: 150ms
      - lambda: 'dial_ui->get_ha_page()->reset_to_devices();'
      - component.update: meine_display_id

  - id: script_ha_execute_action
    mode: single
    then:
      - homeassistant.service:
          service: !lambda |-
            int action = dial_ui->get_ha_page()->get_action_type();
            if (action == 0) return "homeassistant.toggle";
            if (action == 1) return "homeassistant.turn_on";
            return "homeassistant.turn_off";
          data:
            entity_id: !lambda 'return dial_ui->get_ha_page()->get_selected_entity();'
      - delay: 100ms
      - lambda: 'dial_ui->get_ha_page()->reset_to_devices();'
      - component.update: meine_display_id

  - id: update_display_delayed
    mode: restart
    then:
      - wait_until:
          condition:
            lambda: 'return !id(my_buzzer).is_playing();'
      - component.update: meine_display_id        

touchscreen:
  - platform: ft63x6
    id: dial_touch
    i2c_id: bus_internal
    interrupt_pin: GPIO14
    on_touch:
      then:
        - lambda: 'dial_ui->on_touch(touch.x, touch.y);'

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Hintergrundbeleuchtung"
    id: dial_backlight
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_spi
    id: meine_display_id
    model: GC9A01A
    spi_id: spi_bus
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    dimensions:
      width: 240
      height: 240
    data_rate: 40MHz  
    update_interval: 1s
    lambda: |-
      dial_ui->render(it);

interval:
  - interval: 1s
    then:
      - lambda: 'dial_ui->check_sleep();'

sensor:
  - platform: rotary_encoder
    id: dial_encoder
    name: "Dial Drehregler"
    pin_a:
      number: GPIO40
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO41
      mode: INPUT_PULLUP
    resolution: 1
    restore_mode: ALWAYS_ZERO
    on_value:
      then:
        - lambda: 'dial_ui->on_encoder((int)x);'
        - sensor.rotary_encoder.set_value:
            id: dial_encoder
            value: 0

  - platform: homeassistant
    id: temp_sensor
    entity_id: "put your sensor here or delete
    internal: true
    on_value:
      then: [component.update: meine_display_id]

  - platform: homeassistant
    id: humidity_sensor
    entity_id: put your sensor here or delete
    internal: true
    on_value:
      then: [component.update: meine_display_id]

  - platform: wifi_signal
    id: wifi_signal_db
    update_interval: 30s

text_sensor:
  - platform: homeassistant
    id: ha_raw_rooms
    entity_id: sensor.m5_raeume
    internal: true
    on_value:
      then:
        - lambda: |-
            std::vector<std::string> temp_list;
            std::string raw = x;
            std::string delim = "|";
            size_t pos = 0;
            while ((pos = raw.find(delim)) != std::string::npos) {
                std::string token = raw.substr(0, pos);
                if(!token.empty()) { token[0] = ::toupper(token[0]); temp_list.push_back(token); }
                raw.erase(0, pos + delim.length());
            }
            if(!raw.empty()) { raw[0] = ::toupper(raw[0]); temp_list.push_back(raw); }
            dial_ui->get_ha_page()->update_rooms(temp_list);
        - component.update: meine_display_id

  - platform: homeassistant
    id: ha_raw_devices
    entity_id: sensor.m5_aktive_geraete
    attribute: geraete_liste
    internal: true
    on_value:
      then:
        - lambda: |-
            std::vector<std::string> temp_list;
            if (x == "Keine Geräte" || x.empty()) { temp_list.push_back("Keine Geräte"); }
            else {
              std::string raw = x;
              std::string delim = "|";
              size_t pos = 0;
              while ((pos = raw.find(delim)) != std::string::npos) {
                  std::string token = raw.substr(0, pos);
                  if(!token.empty()) { token[0] = ::toupper(token[0]); temp_list.push_back(token); }
                  raw.erase(0, pos + delim.length());
              }
              if(!raw.empty()) { raw[0] = ::toupper(raw[0]); temp_list.push_back(raw); }
            }
            dial_ui->get_ha_page()->update_devices(temp_list);
        - component.update: meine_display_id

binary_sensor:
  - platform: homeassistant
    id: ha_filter_mode
    entity_id: input_boolean.m5_dial_filter_mode
    internal: true
    on_state:
      then: [component.update: meine_display_id]

  - platform: gpio
    name: "Dial Button"
    pin:
      number: GPIO42
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - lambda: 'dial_ui->on_button();'
        - script.execute: update_display_delayed